spring.application.name=VoicesOfSyria
spring.h2.console.enabled=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.datasource.url=jdbc:h2:file:./data/testdb
spring.jpa.hibernate.ddl-auto=update
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
logging.level.org.springframework.security=DEBUG
server.address=0.0.0.0
server.port=8080


# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/stories/


# Transcription Service Configuration
transcription.service.url=http://localhost:5000
transcription.service.timeout=900000
upload.path=uploads/stories


# Embedding Service Configuration
embedding.service.url=http://localhost:5001
embedding.service.api-key=${EMBEDDING_API_KEY:dev-key-change-in-production}
embedding.service.timeout=10000


# Async Thread Pool Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25
spring.task.execution.thread-name-prefix=async-

# Embedding Service Retry Configuration
embedding.service.retry.max-attempts=3
embedding.service.retry.delay-ms=1000
