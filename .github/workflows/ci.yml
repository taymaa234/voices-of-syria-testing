name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ============================================================
  # Job 1: Security Scan with GitLeaks
  # Scans for secrets/credentials leaked in the code
  # ============================================================
  security-scan:
    name: Security Scan (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for GitLeaks

      - name: Run GitLeaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 2: Backend Unit & Integration Tests
  # Runs JUnit tests for BookmarkService and BookmarkController
  # ============================================================
  backend-tests:
    name: Backend Tests (JUnit)
    runs-on: ubuntu-latest
    needs: security-scan  # Only run if security scan passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit & integration tests
        working-directory: Backend
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-must-be-32-chars
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test
          EMBEDDING_API_KEY: test-key
        run: ./mvnw test -Dspring.profiles.active=test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Backend/target/surefire-reports/

  # ============================================================
  # Job 3: Deploy (Placeholder)
  # ============================================================
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ security-scan, backend-tests ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Deploying to staging..."

      - name: Verify deployment
        run: echo "Deployment complete. App is live."
